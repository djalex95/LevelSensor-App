name: Build & Release APK

# Release wird durch einen Versions-Tag ausgelöst (z. B. v1.3.2).
# Push auf main baut KEIN Release mehr.
# Tag muss zur version: in pubspec.yaml passen.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version ermitteln
        id: ver
        run: |
          v=$(grep -oP '^version:\s*\K[^+\s]+' pubspec.yaml | head -n1)
          echo "app=$v" >> "$GITHUB_OUTPUT"
          echo "App-Version: $v"

      - name: Tag == pubspec.yaml prüfen
        if: github.ref_type == 'tag'
        run: |
          test "${GITHUB_REF_NAME#v}" = "${{ steps.ver.outputs.app }}" \
            || { echo "::error::Tag ${GITHUB_REF_NAME} passt nicht zu version ${{ steps.ver.outputs.app }} in pubspec.yaml"; exit 1; }

      - name: Flutter einrichten
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: APK bauen
        run: |
          flutter pub get
          flutter build apk --release

      - name: APK mit Version benennen
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             "dist/Fuellstandsensor-v${{ steps.ver.outputs.app }}-release.apk"

      - name: Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.app }}
          name: App v${{ steps.ver.outputs.app }}
          body: |
            Automatisch gebaut aus dem Tag.
            - App: Fuellstandsensor-v${{ steps.ver.outputs.app }}-release.apk
          files: dist/*.apk
