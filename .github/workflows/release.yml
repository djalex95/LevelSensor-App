name: Build & Release APK

# Bei jedem Push auf main die APK bauen und an ein GitHub-Release hängen.
# Version kommt aus pubspec.yaml (version:).

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: App-Version ermitteln
        id: ver
        run: |
          v=$(grep -oP '^version:\s*\K[0-9]+\.[0-9]+\.[0-9]+' pubspec.yaml | head -n1)
          echo "app=$v" >> "$GITHUB_OUTPUT"
          echo "App-Version: $v"

      - name: Flutter einrichten
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: APK bauen
        run: |
          flutter pub get
          flutter build apk --release

      - name: APK mit Version benennen
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             "dist/Fuellstandsensor-v${{ steps.ver.outputs.app }}-release.apk"

      - name: Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.app }}
          name: App v${{ steps.ver.outputs.app }}
          body: |
            Automatisch gebaut aus main.
            - App: Fuellstandsensor-v${{ steps.ver.outputs.app }}-release.apk
          files: dist/*.apk
